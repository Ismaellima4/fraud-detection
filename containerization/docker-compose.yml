x-api: &api
  build:
    context: ..
    dockerfile: containerization/Dockerfile
  platform: linux/amd64
  restart: unless-stopped
  volumes:
    - ../resources:/app/resources
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 20s
  deploy:
    resources:
      limits:
        cpus: "0.4"
        memory: 140MB
  networks:
    - rinha-network

services:
  api1:
    <<: *api

  api2:
    <<: *api

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 70MB
    networks:
      - rinha-network

networks:
  rinha-network:
    driver: bridge
